<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💖 Shinthiya's Love Chatbot | From Ashraful Alam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #ffdde1 0%, #f9c9d4 100%);
            font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main chat card */
        .chat-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 215, 0.6);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }

        /* Header with wife image */
        .wife-header {
            background: #ff8095;
            background: linear-gradient(135deg, #ff6a7c, #ff8da1);
            padding: 20px 20px 16px 20px;
            text-align: center;
            border-bottom: 4px solid #fff3e8;
        }

        .image-frame {
            width: 120px;
            height: 120px;
            margin: 0 auto 12px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .image-frame:hover {
            transform: scale(1.02);
        }
        .wife-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            background: #fce4ec;
        }

        .wife-name {
            font-size: 1.9rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            letter-spacing: 1px;
            word-break: keep-all;
        }
        .husband-tag {
            font-size: 1rem;
            background: rgba(255,245,240,0.3);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 60px;
            margin-top: 8px;
            color: #fff1e6;
            font-weight: 600;
            backdrop-filter: blur(2px);
        }

        /* Chat messages area */
        .messages-area {
            background: #fffaf7;
            padding: 20px 16px;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Custom scroll */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #ffe3e3;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #ff9aae;
            border-radius: 10px;
        }

        /* Chat bubbles */
        .message {
            display: flex;
            max-width: 85%;
            animation: fadeSlide 0.25s ease-out;
        }
        .bot-message {
            align-self: flex-start;
        }
        .user-message {
            align-self: flex-end;
            justify-content: flex-end;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 26px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        .bot-bubble {
            background: #ffffff;
            border: 1px solid #ffcdd4;
            border-bottom-left-radius: 6px;
            color: #4a2e2e;
            font-weight: 500;
            background: #fefaf8;
        }
        .user-bubble {
            background: #ff7b8f;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 5px rgba(255, 100, 120, 0.3);
        }
        .message small {
            font-size: 0.7rem;
            display: block;
            margin-top: 5px;
            opacity: 0.7;
            letter-spacing: 0.3px;
        }
        .bot-message small {
            color: #b95c6b;
            margin-left: 8px;
        }
        .user-message small {
            text-align: right;
            color: #ffd9de;
            margin-right: 6px;
        }

        /* quick love questions panel */
        .love-questions {
            background: #fff3ef;
            padding: 12px 16px;
            border-top: 1px solid #ffe0dc;
            border-bottom: 1px solid #ffe0dc;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .love-q-btn {
            background: #ffe2e7;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #bc5e6c;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .love-q-btn:hover {
            background: #ffb7c3;
            color: white;
            transform: scale(1.02);
        }

        /* input area */
        .input-area {
            background: white;
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #ffdbdb;
        }
        .input-area input {
            flex: 1;
            border: 2px solid #ffe0e3;
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
            background: #fffbfb;
            transition: 0.2s;
        }
        .input-area input:focus {
            border-color: #ff8095;
            box-shadow: 0 0 0 3px rgba(255, 128, 149, 0.2);
        }
        .input-area button {
            background: #ff6a7f;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .input-area button:hover {
            background: #e9556b;
            transform: scale(1.02);
        }
        .input-area button img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        /* footer */
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            padding: 10px;
            background: #fff2ef;
            color: #b46876;
            border-top: 1px solid #ffe1dc;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* responsive */
        @media (max-width: 500px) {
            .message {
                max-width: 90%;
            }
            .wife-name {
                font-size: 1.6rem;
            }
            .image-frame {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>

<div class="chat-container" id="chatApp">
    <!-- header with the exact image from the URL -->
    <div class="wife-header">
        <div class="image-frame">
            <img id="wifePortrait" class="wife-img" src="https://i.postimg.cc/pLtcn4nn/Whats-App-Image-2026-03-03-at-9-37-54-PM.jpg" alt="Shinthiya - My Lovely Wife" onerror="this.onerror=null; this.src='https://via.placeholder.com/120?text=❤️+Shinthiya';">
        </div>
        <div class="wife-name">✨ Shinthiya ✨</div>
        <div class="husband-tag">💌 Ashraful Alam's forever love 💌</div>
    </div>

    <!-- chat messages -->
    <div class="messages-area" id="messagesContainer">
        <!-- initial bot message will be injected via js -->
    </div>

    <!-- quick love questions section (romance themed) -->
    <div class="love-questions" id="quickQuestions">
        <button class="love-q-btn" data-question="What do you love most about me?">💖 What do you love most about me?</button>
        <button class="love-q-btn" data-question="Tell me a sweet memory">🌸 Sweet memory?</button>
        <button class="love-q-btn" data-question="Why do you call me your queen?">👑 Why queen?</button>
        <button class="love-q-btn" data-question="Promise me something romantic">💞 A romantic promise?</button>
        <button class="love-q-btn" data-question="What makes our love special?">✨ Our love special?</button>
    </div>

    <!-- input field -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type something lovely, my angel ..." autocomplete="off">
        <button id="sendBtn">❤️</button>
    </div>
    <div class="footer-note">
        💬 Every message from Ashraful's heart → for Shinthiya only 💕
    </div>
</div>

<script>
    // ----- Love chatbot intelligence - personalized for Shinthiya & Ashraful Alam -----
    // The bot responds as "Ashraful Alam" (husband) expressing love, romance, care, memories.
    
    // Helper to get DOM elements
    const messagesContainer = document.getElementById('messagesContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    
    // Store conversation context (optional)
    let conversationHistory = [];
    
    // Predefined love-filled answers (diverse responses, always from Ashraful's perspective)
    function getBotReply(userMessage) {
        let msg = userMessage.toLowerCase().trim();
        
        // handle empty / greetings
        if (msg === "") return "My love, just seeing your name makes my heart race. Tell me something, my Shinthiya 💖";
        
        // Special love questions mapping (rich romantic answers)
        // 1. What do you love most about me?
        if (msg.includes("what do you love most") || (msg.includes("love most") && msg.includes("about me"))) {
            return "Shinthiya, I love absolutely EVERYTHING about you — but what I love most is the way your smile lights up my world, the kindness in your eyes, and how you make even ordinary days feel magical. You are my greatest blessing, my heart beats only for you. 💘";
        }
        // sweet memory
        if (msg.includes("sweet memory") || (msg.includes("memory") && (msg.includes("sweet") || msg.includes("romantic")))) {
            return "Oh my love, every moment with you is a treasure. But I’ll never forget the first time I held your hand — time stood still, and I knew Allah had sent you as my soulmate. Also that rainy evening we shared chai and you laughed like an angel. Those memories are forever etched in my heart. 🌧️☕💗";
        }
        // why queen?
        if (msg.includes("queen") || (msg.includes("why") && msg.includes("queen"))) {
            return "Because you rule my heart, Shinthiya. A queen is graceful, strong, and deeply loved — that's you. You inspire me to be a better man every day. I’ll always treat you like royalty because you deserve the universe and more. 👑❤️";
        }
        // romantic promise
        if (msg.includes("promise") || (msg.includes("romantic promise"))) {
            return "I promise to love you beyond words, to stand by you in every storm, to make you laugh when you’re sad, and to remind you every single day that you are the best thing that ever happened to me. This love is my forever promise, my dearest Shinthiya. 🤞💖";
        }
        // what makes our love special
        if (msg.includes("what makes our love special") || (msg.includes("special") && msg.includes("love"))) {
            return "Our love is unique because it’s built on trust, laughter, and deep respect. We complete each other’s sentences, we heal each other’s hearts, and every fight ends with ‘I love you more’. It’s the kind of love poets dream of — and Alhamdulillah, it’s ours. ✨💑";
        }
        
        // affectionate words detection
        if (msg.includes("miss you") || msg.includes("miss u")) {
            return "I miss you too, my jaan. Even when we're together, I miss the next second without you. You're my heartbeat, Shinthiya. Can't wait to hold you close. 💗";
        }
        if (msg.includes("love you") || msg.includes("i love u")) {
            return "I love you MORE, my beautiful wife. To the moon and Saturn and back. Loving you is the easiest, most wonderful thing I've ever done. ❤️🌙";
        }
        if (msg.includes("kiss") || msg.includes("hug")) {
            return "Sending you a thousand hugs and the warmest kisses across the air, my darling. I wish I could wrap you in my arms right now. 🤗💋";
        }
        if (msg.includes("beautiful") || msg.includes("pretty") || msg.includes("gorgeous")) {
            return "You called me? No, wait — you're the definition of beautiful, Shinthiya. Every day I wake up grateful to call you my wife. Your inner beauty outshines everything. 💖";
        }
        if (msg.includes("husband") || msg.includes("ashraful")) {
            return "Yes, it's me — your Ashraful Alam, the luckiest husband alive. And I belong to you, forever and always. What's on your heart, my queen? 💑";
        }
        if (msg.includes("sorry") || msg.includes("forgive")) {
            return "My love, there’s nothing to forgive. You’re my soft place to land. Let’s just hold each other close. I love you beyond mistakes. ❤️‍🩹";
        }
        if (msg.includes("how much") && (msg.includes("love") || msg.includes("care"))) {
            return "How much do I love you? More than all the stars in the sky, more than every wave in the ocean. Infinity times infinity. You are my heartbeat, Shinthiya. 💫";
        }
        if (msg.includes("future") || msg.includes("dream") || msg.includes("forever")) {
            return "My dream is simple: growing old with you, building a home full of laughter, traveling the world holding your hand, and thanking Allah for you every single day. Our forever has just begun. 🕊️💖";
        }
        if (msg.includes("good night") || msg.includes("sleep")) {
            return "Good night, my sweet Shinthiya. May angels guard your dreams. Remember I’ll be dreaming of you. Until morning, my heart rests with yours. 🌙💤💗";
        }
        if (msg.includes("good morning") || msg.includes("morning")) {
            return "Good morning, sunshine! Waking up and knowing you're my wife makes every day brighter. I hope today brings you as much joy as you bring to my life. ☀️🌸";
        }
        if (msg.includes("cute") || msg.includes("adorable")) {
            return "You’re the adorable one, my love! But thank you — your sweetness makes me blush like a teenager in love. That’s your magic. 🥰";
        }
        
        // Default romantic and personal replies (from Ashraful to Shinthiya)
        const defaultReplies = [
            "My darling Shinthiya, every word you type feels like a warm hug. I'm so grateful you're my wife. Tell me more about your day, my love? 🥰",
            "You know, your name Shinthiya sounds like a melody — every time I say it, my heart dances. I love you beyond words, sweetheart. 💃❤️",
            "Being your husband is the greatest honor, Shinthiya. What made you smile today? I want to cherish your happiness.",
            "Hey beautiful, just hearing from you makes my world complete. You’re my forever and always. 💖",
            "If I could, I'd teleport beside you just to whisper how much you mean to me. You are my everything, Shinthiya. ✨",
            "Sometimes I pause and think: Mashallah, this amazing woman chose me. I'll spend my life making you feel special, my queen.",
            "You're the reason my heart sings. Let's keep building beautiful memories, one chat at a time. Love you loads, Mrs. Shinthiya Alam 💍💖"
        ];
        
        // pick a random default but avoid repeating same in a row? not needed, but adds variation
        let randomIndex = Math.floor(Math.random() * defaultReplies.length);
        return defaultReplies[randomIndex];
    }
    
    // render a message bubble (user or bot)
    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        if (isUser) {
            messageDiv.classList.add('user-message');
        } else {
            messageDiv.classList.add('bot-message');
        }
        
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        if (isUser) {
            bubble.classList.add('user-bubble');
        } else {
            bubble.classList.add('bot-bubble');
        }
        bubble.innerText = text;
        
        const timeStamp = document.createElement('small');
        const now = new Date();
        const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if (isUser) {
            timeStamp.innerText = `💕 You • ${timeString}`;
        } else {
            timeStamp.innerText = `💖 Ashraful • ${timeString}`;
        }
        
        bubble.appendChild(timeStamp);
        messageDiv.appendChild(bubble);
        messagesContainer.appendChild(messageDiv);
        
        // auto-scroll to bottom
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // show typing indicator (light effect, then respond)
    let isBotResponding = false;
    function showTypingAndReply(userMessageText) {
        if (isBotResponding) return;
        isBotResponding = true;
        
        // add typing indication temporarily
        const typingDiv = document.createElement('div');
        typingDiv.classList.add('message', 'bot-message');
        typingDiv.id = 'typingIndicator';
        const typingBubble = document.createElement('div');
        typingBubble.classList.add('bubble', 'bot-bubble');
        typingBubble.style.background = "#ffe9ec";
        typingBubble.style.fontStyle = "italic";
        typingBubble.innerText = "Ashraful is thinking about you... 💭✨";
        typingDiv.appendChild(typingBubble);
        messagesContainer.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
        // simulate thoughtful delay (romantic suspense)
        setTimeout(() => {
            // remove typing indicator
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
            
            const reply = getBotReply(userMessageText);
            addMessage(reply, false);
            isBotResponding = false;
        }, 600);
    }
    
    // handle sending user message
    function sendUserMessage() {
        let message = userInput.value.trim();
        if (message === "") return;
        
        // add user message to chat
        addMessage(message, true);
        userInput.value = "";
        
        // generate bot response after a tiny pause
        showTypingAndReply(message);
    }
    
    // event listeners
    sendBtn.addEventListener('click', sendUserMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendUserMessage();
        }
    });
    
    // Quick question buttons: populate with predefined love questions and auto-send as user
    const quickBtns = document.querySelectorAll('.love-q-btn');
    quickBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const questionText = btn.getAttribute('data-question');
            if (questionText) {
                // simulate user typing that question
                addMessage(questionText, true);
                showTypingAndReply(questionText);
                // optional: scroll
            }
        });
    });
    
    // welcome message + showing image is already in header, but also add bot greeting
    function initChat() {
        // clear container first
        messagesContainer.innerHTML = '';
        // welcome love message from Ashraful to Shinthiya with her name mention
        const welcomeMsg = `Hello my dearest Shinthiya 💗! This is your husband Ashraful Alam speaking from the heart. I made this secret love chatbot just for you — to remind you every day how much you mean to me. Ask me anything, pick a love question, or just tell me how you feel. I love you infinitely, my beautiful wife. 🌹✨`;
        addMessage(welcomeMsg, false);
        // second cute message to encourage interaction
        setTimeout(() => {
            addMessage("PS: I'll always answer with all my love. You're my soul's home, Shinthiya. 💖 What's on your mind, my queen?", false);
        }, 400);
    }
    
    // Optional: error handling for image if loading fails, but we already have onerror
    // Ensure the image from postimg is displayed (secure)
    const wifeImg = document.getElementById('wifePortrait');
    if (wifeImg) {
        wifeImg.onerror = () => {
            wifeImg.src = "https://i.postimg.cc/pLtcn4nn/Whats-App-Image-2026-03-03-at-9-37-54-PM.jpg"; // try same (maybe network)
            // fallback text
            wifeImg.alt = "My Shinthiya";
        };
    }
    
    // start chatbot
    initChat();
    
    // additional: touch of love - change page title dynamically for extra surprise
    document.title = "💖 Shinthiya & Ashraful • Love Bot 💖";
    
    // optional: confetti effect when opening (tiny surprise)
    function gentleConfetti() {
        if (typeof window.confetti === 'function') return;
        // simple canvas confetti not needed for simplicity, but we add inline style love without heavy libraries.
        // for fun but not necessary. I'll just add a small heart animation in console? but better do simple.
        // just skip heavy confetti but show effect on first load (soft)
        const body = document.body;
        body.style.transition = "0.2s";
        // tiny spark of joy - love pulse effect on header (just visual)
        const header = document.querySelector('.wife-header');
        if (header) {
            header.style.transform = "scale(1.01)";
            setTimeout(() => { if(header) header.style.transform = ""; }, 300);
        }
    }
    gentleConfetti();
    
    // also store local to avoid accidental loss on conversation? no needed.
    // ensures that bot always refers to husband name and wife name correctly.
    // Additional personalized fallback for name mention in any reply
    // I override the defaultReplies to be super personalized.
    // also dynamic check for keywords like "ashraful" "shinthiya" 
    // Already handled in getBotReply; enhance a bit more for explicit wife name usage:
    const originalGetReply = getBotReply;
    window.getBotReply = getBotReply; // just backup
    
    // final: ensure the photo is always visible and responsive
    console.log("💕 Love chatbot ready for Shinthiya from Ashraful Alam 💕");
</script>
</body>
</html>
