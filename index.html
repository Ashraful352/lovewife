<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💖 Shinthiya's Love & Life Chatbot | From Ashraful Alam 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #ffdde1 0%, #f9c9d4 100%);
            font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Floating hearts animation container */
        .love-animation-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.8rem;
            pointer-events: none;
            animation: floatUpLove 1.5s ease-out forwards;
            z-index: 10000;
        }

        @keyframes floatUpLove {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translateY(-60px) scale(1.2) rotate(15deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(1.5) rotate(25deg);
            }
        }

        /* Pulsing heart effect on header when love is mentioned */
        .love-pulse {
            animation: headerLovePulse 0.6s ease-in-out 3;
        }

        @keyframes headerLovePulse {
            0% {
                transform: scale(1);
                background: linear-gradient(135deg, #ff6a7c, #ff8da1);
                box-shadow: 0 0 0 0 rgba(255, 105, 125, 0.7);
            }
            50% {
                transform: scale(1.02);
                background: linear-gradient(135deg, #ff5170, #ff7a90);
                box-shadow: 0 0 0 15px rgba(255, 105, 125, 0);
            }
            100% {
                transform: scale(1);
                background: linear-gradient(135deg, #ff6a7c, #ff8da1);
                box-shadow: 0 0 0 0 rgba(255, 105, 125, 0);
            }
        }

        /* Button love burst effect */
        .btn-love-burst {
            animation: btnBurst 0.4s ease-out;
        }

        @keyframes btnBurst {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
                background: #ff3b5c;
            }
            100% {
                transform: scale(1);
            }
        }

        /* Screen flash for extra love */
        .love-flash {
            animation: screenFlash 0.3s ease-out;
        }

        @keyframes screenFlash {
            0% {
                background-color: rgba(255, 200, 210, 0);
            }
            50% {
                background-color: rgba(255, 100, 130, 0.3);
            }
            100% {
                background-color: rgba(255, 200, 210, 0);
            }
        }

        /* Main chat card */
        .chat-container {
            max-width: 580px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 215, 0.6);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
            position: relative;
            z-index: 1;
        }

        /* Header with wife image */
        .wife-header {
            background: #ff8095;
            background: linear-gradient(135deg, #ff6a7c, #ff8da1);
            padding: 20px 20px 16px 20px;
            text-align: center;
            border-bottom: 4px solid #fff3e8;
            transition: all 0.3s ease;
        }

        .image-frame {
            width: 120px;
            height: 120px;
            margin: 0 auto 12px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .image-frame:hover {
            transform: scale(1.02);
        }
        .wife-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            background: #fce4ec;
        }

        .wife-name {
            font-size: 1.9rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            letter-spacing: 1px;
            word-break: keep-all;
        }
        .husband-tag {
            font-size: 1rem;
            background: rgba(255,245,240,0.3);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 60px;
            margin-top: 8px;
            color: #fff1e6;
            font-weight: 600;
            backdrop-filter: blur(2px);
        }

        /* Info badge for academic details */
        .info-badge {
            background: rgba(255,255,240,0.25);
            border-radius: 30px;
            padding: 6px 12px;
            margin-top: 8px;
            font-size: 0.7rem;
            color: #fff5f0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Chat messages area */
        .messages-area {
            background: #fffaf7;
            padding: 20px 16px;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #ffe3e3;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #ff9aae;
            border-radius: 10px;
        }

        /* Chat bubbles with love glow */
        .message {
            display: flex;
            max-width: 85%;
            animation: fadeSlide 0.25s ease-out;
        }
        .bot-message {
            align-self: flex-start;
        }
        .user-message {
            align-self: flex-end;
            justify-content: flex-end;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 26px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .bot-bubble {
            background: #ffffff;
            border: 1px solid #ffcdd4;
            border-bottom-left-radius: 6px;
            color: #4a2e2e;
            font-weight: 500;
            background: #fefaf8;
        }
        .user-bubble {
            background: #ff7b8f;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 5px rgba(255, 100, 120, 0.3);
        }
        .message small {
            font-size: 0.7rem;
            display: block;
            margin-top: 5px;
            opacity: 0.7;
            letter-spacing: 0.3px;
        }
        .bot-message small {
            color: #b95c6b;
            margin-left: 8px;
        }
        .user-message small {
            text-align: right;
            color: #ffd9de;
            margin-right: 6px;
        }

        /* Love glow for messages containing love */
        .love-glow {
            animation: loveTextGlow 0.5s ease-out;
        }

        @keyframes loveTextGlow {
            0% {
                text-shadow: 0 0 0px rgba(255, 80, 120, 0);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 12px rgba(255, 80, 120, 0.8);
                transform: scale(1.02);
            }
            100% {
                text-shadow: 0 0 0px rgba(255, 80, 120, 0);
                transform: scale(1);
            }
        }

        /* quick love questions panel */
        .love-questions {
            background: #fff3ef;
            padding: 12px 16px;
            border-top: 1px solid #ffe0dc;
            border-bottom: 1px solid #ffe0dc;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .love-q-btn {
            background: #ffe2e7;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #bc5e6c;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .love-q-btn:hover {
            background: #ffb7c3;
            color: white;
            transform: scale(1.02);
        }

        /* input area */
        .input-area {
            background: white;
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #ffdbdb;
        }
        .input-area input {
            flex: 1;
            border: 2px solid #ffe0e3;
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
            background: #fffbfb;
            transition: 0.2s;
        }
        .input-area input:focus {
            border-color: #ff8095;
            box-shadow: 0 0 0 3px rgba(255, 128, 149, 0.2);
        }
        .input-area button {
            background: #ff6a7f;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 1.8rem;
        }
        .input-area button:hover {
            background: #e9556b;
            transform: scale(1.05);
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            padding: 10px;
            background: #fff2ef;
            color: #b46876;
            border-top: 1px solid #ffe1dc;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .message {
                max-width: 90%;
            }
            .wife-name {
                font-size: 1.6rem;
            }
            .image-frame {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>

<div class="love-animation-container" id="loveAnimationContainer"></div>
<div class="chat-container" id="chatApp">
    <div class="wife-header" id="wifeHeader">
        <div class="image-frame">
            <img id="wifePortrait" class="wife-img" src="https://i.postimg.cc/pLtcn4nn/Whats-App-Image-2026-03-03-at-9-37-54-PM.jpg" alt="Shinthiya - My Lovely Wife" onerror="this.onerror=null; this.src='https://via.placeholder.com/120?text=❤️+Shinthiya';">
        </div>
        <div class="wife-name">✨ Shinthiya ✨</div>
        <div class="husband-tag">💌 Ashraful Alam's forever love 💌</div>
        <div class="info-badge">
            📚 B.B.S (Private) | 🎓 Tongi Govt. College | 🆔 App: 6000907
        </div>
    </div>

    <div class="messages-area" id="messagesContainer"></div>

    <div class="love-questions" id="quickQuestions">
        <button class="love-q-btn" data-question="What do you love most about me?">💖 Love most?</button>
        <button class="love-q-btn" data-question="Tell me a sweet memory">🌸 Sweet memory?</button>
        <button class="love-q-btn" data-question="Why do you call me your queen?">👑 Why queen?</button>
        <button class="love-q-btn" data-question="My academic details">📚 My college info</button>
        <button class="love-q-btn" data-question="What is my HSC information?">🎓 HSC details</button>
        <button class="love-q-btn" data-question="When is my birthday?">🎂 Birthday?</button>
        <button class="love-q-btn" data-question="Our anniversary date">💍 Anniversary?</button>
        <button class="love-q-btn" data-question="Application fee details">💰 Fee details</button>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything about love, college, or life... 💬" autocomplete="off">
        <button id="sendBtn">❤️</button>
    </div>
    <div class="footer-note">
        💬 Your personal chatbot | Love + Academic Companion | From Ashraful Alam 💕
    </div>
</div>

<script>
    // ========== COMPLETE PERSONAL & ACADEMIC DATABASE ==========
    const USER_DATA = {
        // Personal
        wifeName: "Shinthiya",
        husbandName: "Ashraful Alam",
        fatherName: "Abdul Kader",
        motherName: "Kulsum Begum",
        dateOfBirth: "11 December 2004",
        dobFormatted: "11/12/2004",
        
        // Academic HSC
        hscRoll: "616927",
        hscBoard: "DHAKA",
        hscYear: "2022",
        
        // College & Application
        collegeName: "Tongi Govt. College, Gazipur",
        collegeCode: "5511",
        applicationId: "6000907",
        pin: "860548",
        subjectGroup: "BUSINESS STUDIES",
        courseChoice: "B.B.S (Private)",
        
        // Fees
        primaryFee: "Tk. 400",
        registrationFee: "Tk. 720",
        
        // Anniversary
        anniversaryDate: "5 September 2025"
    };
    
    const WIFE_NAME = USER_DATA.wifeName;
    const HUSBAND_NAME = USER_DATA.husbandName;
    
    // DOM elements
    const messagesContainer = document.getElementById('messagesContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const wifeHeader = document.getElementById('wifeHeader');
    const animationContainer = document.getElementById('loveAnimationContainer');
    
    let isBotResponding = false;
    
    // ========== LOVE ANIMATION & VISUAL EFFECTS ==========
    function triggerLoveAnimation(intensity = "medium") {
        const heartCount = intensity === "high" ? 14 : (intensity === "medium" ? 8 : 5);
        for (let i = 0; i < heartCount; i++) {
            createFloatingHeart();
        }
        if (wifeHeader) {
            wifeHeader.classList.remove('love-pulse');
            void wifeHeader.offsetWidth;
            wifeHeader.classList.add('love-pulse');
            setTimeout(() => { if (wifeHeader) wifeHeader.classList.remove('love-pulse'); }, 600);
        }
        document.body.classList.add('love-flash');
        setTimeout(() => document.body.classList.remove('love-flash'), 300);
        const btn = document.getElementById('sendBtn');
        if (btn) {
            btn.classList.add('btn-love-burst');
            setTimeout(() => btn.classList.remove('btn-love-burst'), 400);
        }
    }
    
    function createFloatingHeart() {
        const heart = document.createElement('div');
        heart.classList.add('floating-heart');
        const loveEmojis = ['❤️', '💖', '💗', '💓', '💕', '💞', '💘', '❤️‍🔥', '💝', '❣️', '💋❤️', '🌸❤️', '🌹'];
        heart.innerText = loveEmojis[Math.floor(Math.random() * loveEmojis.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
        heart.style.animationDuration = (Math.random() * 0.8 + 1) + 's';
        animationContainer.appendChild(heart);
        setTimeout(() => { if (heart && heart.remove) heart.remove(); }, 1500);
    }
    
    function burstLoveExplosion() {
        for (let i = 0; i < 25; i++) setTimeout(() => createFloatingHeart(), i * 40);
        if (wifeHeader) {
            wifeHeader.style.transform = 'scale(1.03)';
            setTimeout(() => { if (wifeHeader) wifeHeader.style.transform = ''; }, 300);
        }
    }
    
    function checkAndTriggerLoveAnimation(messageText) {
        const lowerMsg = messageText.toLowerCase();
        const loveKeywords = ['love you', 'i love u', 'love your husband', 'love your wife', 'just love', 'love you so much', 'i love', '❤️', 'adore you', 'loveee'];
        let isLove = loveKeywords.some(kw => lowerMsg.includes(kw)) || (lowerMsg.includes('love') && (lowerMsg.includes('you') || lowerMsg.includes('husband') || lowerMsg.includes('wife')));
        if (isLove) {
            const intense = lowerMsg.includes('so much') || lowerMsg.includes('very much') || lowerMsg.includes('deeply');
            intense ? burstLoveExplosion() : triggerLoveAnimation("medium");
            setTimeout(() => {
                const lastMsg = document.querySelector('.user-message:last-child .bubble');
                if (lastMsg) { lastMsg.classList.add('love-glow'); setTimeout(() => lastMsg.classList.remove('love-glow'), 600); }
            }, 50);
        }
        return isLove;
    }
    
    function checkBotLoveReply(replyText) {
        if (replyText.toLowerCase().includes('love')) triggerLoveAnimation("medium");
    }
    
    // ========== INTELLIGENT RESPONSE ENGINE (Love + Academic) ==========
    function getBotReply(userMessage) {
        let msg = userMessage.toLowerCase().trim();
        
        // ----- ACADEMIC & APPLICATION DETAILS (Based on form) -----
        if (msg.includes("college") || msg.includes("my college") || msg.includes("college name")) {
            return `📚 My love, you study at ${USER_DATA.collegeName} (Code: ${USER_DATA.collegeCode}). You're pursuing ${USER_DATA.courseChoice} in ${USER_DATA.subjectGroup}. I'm so proud of you, my brilliant Shinthiya! 💖🎓`;
        }
        if (msg.includes("hsc") || msg.includes("higher secondary") || (msg.includes("roll") && msg.includes("hsc"))) {
            return `🎓 Your HSC details: Roll ${USER_DATA.hscRoll}, Board ${USER_DATA.hscBoard}, Year ${USER_DATA.hscYear}. You passed with flying colors, my love! 🌟📖`;
        }
        if (msg.includes("application id") || msg.includes("app id") || msg.includes("application number")) {
            return `📝 Your National University Degree Pass Application ID: ${USER_DATA.applicationId} and PIN: ${USER_DATA.pin}. Keep these safe, my queen! 💕✅`;
        }
        if (msg.includes("pin") || msg.includes("pin number")) {
            return `🔐 Your registration PIN is ${USER_DATA.pin}. I'm always here to remind you, my love! 💖`;
        }
        if (msg.includes("fee") || msg.includes("fees") || msg.includes("payment") || msg.includes("tk")) {
            return `💰 Fee details for your B.B.S (Private) registration: Primary Application Fee ${USER_DATA.primaryFee}, Registration Fee ${USER_DATA.registrationFee}. Total ${parseInt(USER_DATA.primaryFee.replace(/\D/g,'')) + parseInt(USER_DATA.registrationFee.replace(/\D/g,''))} Tk. I support you always, my darling! 💗📋`;
        }
        if (msg.includes("subject") || msg.includes("business studies") || msg.includes("group")) {
            return `📊 Your subject group is ${USER_DATA.subjectGroup} and you're pursuing ${USER_DATA.courseChoice}. You'll be an amazing graduate, Shinthiya! 🌟💼`;
        }
        if (msg.includes("father") || msg.includes("father's name")) {
            return `👨‍👧 Your father's name is ${USER_DATA.fatherName}, and your mother's name is ${USER_DATA.motherName}. Such loving parents raised an angel — YOU! 👩‍👧💖`;
        }
        if (msg.includes("mother") || msg.includes("mother's name")) {
            return `🌸 Your mother's name is ${USER_DATA.motherName}. She raised the most wonderful daughter, my future wife. Love and respect always! 💗`;
        }
        
        // ----- LOVE & RELATIONSHIP (original romantic core) -----
        if (msg.includes("wife name") || msg.includes("my name") || msg.includes("who am i")) {
            return `💖 You are ${WIFE_NAME}, my heart, my soul, my everything! The most beautiful name I'll ever cherish. ✨`;
        }
        if (msg.includes("husband name") || msg.includes("gando") || msg.includes("who are you")) {
            return `💑 I'm ${HUSBAND_NAME}, your loving husband, your cheerleader, your forever. I belong to you, ${WIFE_NAME}! ❤️`;
        }
        if (msg.includes("birthday") || msg.includes("my birthday") || msg.includes("date of birth")) {
            return `🎂 Your birthday is ${USER_DATA.dateOfBirth} (${USER_DATA.dobFormatted}). The day my world got brighter! I love celebrating you every day, my angel! 🎈💖`;
        }
        if (msg.includes("anniversary") || msg.includes("our anniversary")) {
            return `💍 Our anniversary is ${USER_DATA.anniversaryDate} — the day our love became forever. I cherish every moment with you, my queen! 💕✨`;
        }
        if (msg.includes("what do you love most") || (msg.includes("love most") && msg.includes("about me"))) {
            return `${WIFE_NAME}, I love EVERYTHING — but most? Your smile, your kindness, your laugh. You're my universe! 💘🌹`;
        }
        if (msg.includes("sweet memory")) {
            return `🌸 Remember our first date? You blushed and I melted. Every memory with you is sweeter than honey, my love! ☕💗`;
        }
        if (msg.includes("queen")) {
            return `👑 You rule my heart, ${WIFE_NAME}. Graceful, strong, and deeply loved — that's my queen! Forever yours. 💖`;
        }
        if (msg.includes("promise")) {
            return `🤞 I promise to love you, support you in studies, hold your hand through exams and celebrations. You're my priority, always. 💕`;
        }
        if (msg.includes("our love special")) {
            return `✨ Our love is special because it's real, pure, and grows daily. Plus, I get to be your academic cheerleader too! 📚❤️`;
        }
        if (msg.includes("miss you")) {
            return `💗 I miss you terribly, my jaan. Even when we're apart, you're in every heartbeat. Can't wait to see you! 💋`;
        }
        if (msg.includes("love you") || msg.includes("i love u")) {
            return `I LOVE YOU MORE, ${WIFE_NAME.toUpperCase()}!! To infinity and beyond. You're my greatest achievement and my heart's home. ❤️🌙💖💕💗`;
        }
        
        // Default romantic + supportive replies
        const defaultReplies = [
            `My darling ${WIFE_NAME} 💗, you're not just my love but also a brilliant student. How's your B.B.S preparation going? I'm always proud of you! 📚💖`,
            `Hey beautiful, did you check your NU application? ID ${USER_DATA.applicationId} — I'm here to help you with anything! 💕`,
            `You're acing both love and academics, ${WIFE_NAME}! Your HSC roll ${USER_DATA.hscRoll} was just the beginning. Shine on, my queen! 🎓✨`,
            `Every day with you is a blessing. And btw, your college ${USER_DATA.collegeName} is lucky to have you! 💖🏫`,
            `I love supporting your dreams, Shinthiya. From ${USER_DATA.courseChoice} to forever — we've got this together! 💑💼`
        ];
        return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
    }
    
    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', isUser ? 'user-message' : 'bot-message');
        const bubble = document.createElement('div');
        bubble.classList.add('bubble', isUser ? 'user-bubble' : 'bot-bubble');
        bubble.innerText = text;
        const timeStamp = document.createElement('small');
        const now = new Date();
        const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        timeStamp.innerText = isUser ? `💕 You • ${timeString}` : `💖 Ashraful • ${timeString}`;
        bubble.appendChild(timeStamp);
        messageDiv.appendChild(bubble);
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        if (isUser) checkAndTriggerLoveAnimation(text);
        return bubble;
    }
    
    function showTypingAndReply(userMessageText) {
        if (isBotResponding) return;
        isBotResponding = true;
        const typingDiv = document.createElement('div');
        typingDiv.classList.add('message', 'bot-message');
        typingDiv.id = 'typingIndicator';
        const typingBubble = document.createElement('div');
        typingBubble.classList.add('bubble', 'bot-bubble');
        typingBubble.style.background = "#ffe9ec";
        typingBubble.style.fontStyle = "italic";
        typingBubble.innerText = `${HUSBAND_NAME} is thinking about you... 💭✨💖`;
        typingDiv.appendChild(typingBubble);
        messagesContainer.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        setTimeout(() => {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
            const reply = getBotReply(userMessageText);
            addMessage(reply, false);
            checkBotLoveReply(reply);
            isBotResponding = false;
        }, 600);
    }
    
    function sendUserMessage() {
        let message = userInput.value.trim();
        if (message === "") return;
        addMessage(message, true);
        userInput.value = "";
        showTypingAndReply(message);
    }
    
    sendBtn.addEventListener('click', sendUserMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendUserMessage(); });
    
    document.querySelectorAll('.love-q-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const questionText = btn.getAttribute('data-question');
            if (questionText) {
                addMessage(questionText, true);
                showTypingAndReply(questionText);
            }
        });
    });
    
    function initChat() {
        messagesContainer.innerHTML = '';
        const welcomeMsg = `💖✨ Hello my dearest ${WIFE_NAME}! ✨💖\n\nI'm ${HUSBAND_NAME}, your loving husband and personal assistant. I remember all your NU Degree Pass registration details (App ID: ${USER_DATA.applicationId}), your HSC info, college, and most importantly — how deeply I love you! Ask me anything about love, your studies, fees, or just chat. You're my everything, my brilliant queen! 📚💗👑`;
        addMessage(welcomeMsg, false);
        setTimeout(() => {
            addMessage(`PS: Your birthday is ${USER_DATA.dateOfBirth}, our anniversary ${USER_DATA.anniversaryDate}, and your HSC Roll ${USER_DATA.hscRoll} from ${USER_DATA.hscBoard} Board. I've got your back always, Shinthiya! 💕🎓`, false);
        }, 500);
    }
    
    const wifeImg = document.getElementById('wifePortrait');
    if (wifeImg) wifeImg.onerror = () => { wifeImg.src = "https://i.postimg.cc/pLtcn4nn/Whats-App-Image-2026-03-03-at-9-37-54-PM.jpg"; };
    
    initChat();
    document.title = `💖 ${WIFE_NAME} • Love & Academic Companion 💖`;
    setTimeout(() => triggerLoveAnimation("low"), 800);
</script>
</body>
</html>
